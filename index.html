<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- ИЗМЕНЕННЫЙ ЗАГОЛОВОК СТРАНИЦЫ -->
    <title>Gemini - Ваш ИИ ассистент</title>
    
    <style>
        /* БАЗОВЫЕ НАСТРОЙКИ */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #131314;
            color: #e3e3e3;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* БОКОВАЯ ПАНЕЛЬ */
        .sidebar {
            width: 256px;
            background-color: #1e1f20;
            padding: 16px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .new-chat-btn {
            display: flex;
            align-items: center;
            gap: 12px;
            background-color: #1a1a1c;
            border: none;
            color: #80868b;
            font-size: 14px;
            padding: 12px 16px;
            border-radius: 100px;
            width: 100%;
            cursor: pointer;
            transition: background 0.2s;
            margin-bottom: 32px;
        }
        .new-chat-btn:hover {
            background-color: #282a2c;
            color: #e3e3e3;
        }
        .history-title {
            font-size: 12px;
            font-weight: 600;
            color: #80868b;
            padding: 0 8px;
            margin-bottom: 8px;
        }
        .history-item {
            padding: 8px;
            font-size: 14px;
            color: #c4c7c5;
            border-radius: 8px;
            cursor: pointer;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .history-item:hover {
            background-color: #282a2c;
        }

        /* Кнопка Advanced с анимацией градиента */
        @keyframes shimmer {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .advanced-btn {
            background: linear-gradient(90deg, #4285F4, #9B51E0, #EA4335);
            background-size: 200% 200%;
            animation: shimmer 4s ease infinite;
            border: none;
            color: white;
            font-weight: 500;
            font-size: 14px;
            padding: 10px 16px;
            border-radius: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .advanced-btn:hover {
            opacity: 0.9;
        }

        /* ОСНОВНАЯ ОБЛАСТЬ */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            height: 100%;
            position: relative;
        }

        /* Шапка */
        .header {
            padding: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #131314;
        }
        .logo {
            font-size: 20px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .version-badge {
            font-size: 12px;
            background-color: #282a2c;
            color: #80868b;
            padding: 2px 8px;
            border-radius: 6px;
        }
        .login-btn {
            background-color: #a8c7fa;
            color: #041e49;
            font-weight: 500;
            font-size: 14px;
            padding: 10px 24px;
            border-radius: 100px;
            border: none;
            cursor: pointer;
            transition: background 0.2s;
        }
        .login-btn:hover {
            background-color: #c2e7ff;
        }

        /* Чат-окно */
        .chat-window {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            max-width: 800px;
            width: 100%;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }
        .welcome-screen {
            text-align: center;
            margin-top: 80px;
        }
        .welcome-title {
            font-size: 48px;
            font-weight: 500;
            letter-spacing: -1px;
            background: linear-gradient(90deg, #4b90ff, #ff5546, #9b51e0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 16px;
        }
        .welcome-subtitle {
            color: #80868b;
            font-size: 18px;
        }

        /* Сообщения */
        .message-user {
            display: flex;
            justify-content: flex-end;
        }
        .message-user-text {
            background-color: #282a2c;
            padding: 10px 16px;
            border-radius: 18px;
            max-width: 70%;
            word-wrap: break-word;
        }
        .message-ai {
            display: flex;
            align-items: flex-start;
            gap: 16px;
        }
        .ai-avatar {
            width: 32px;
            height: 32px;
            background-color: #1a73e8;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 12px;
            flex-shrink: 0;
        }
        .message-ai-text {
            max-width: 85%;
            padding-top: 4px;
            line-height: 1.5;
        }

        /* Блок ввода */
        .input-container {
            padding: 16px;
            max-width: 800px;
            width: 100%;
            margin: 0 auto;
            background-color: #131314;
        }
        .input-field-wrapper {
            background-color: #1e1f20;
            border-radius: 28px;
            padding: 16px;
            display: flex;
            align-items: flex-end;
            gap: 16px;
            border: 1px solid transparent;
        }
        .input-field-wrapper:focus-within {
            border-color: #3c4043;
        }
        .chat-textarea {
            width: 100%;
            background: transparent;
            border: none;
            color: #e3e3e3;
            outline: none;
            resize: none;
            font-size: 16px;
            font-family: inherit;
            height: 24px;
            max-height: 200px;
        }
        .chat-textarea::placeholder {
            color: #80868b;
        }
        .input-actions {
            display: flex;
            align-items: center;
            gap: 12px;
            color: #80868b;
        }
        .action-icon-btn {
            background: none;
            border: none;
            color: inherit;
            cursor: pointer;
            display: flex;
            align-items: center;
        }
        .action-icon-btn:hover {
            color: white;
        }
        .send-btn {
            color: #a8c7fa;
        }
        .disclaimer {
            text-align: center;
            font-size: 12px;
            color: #80868b;
            margin-top: 8px;
        }

        /* Адаптивность для мобильных устройств */
        @media (max-width: 768px) {
            .sidebar { display: none; }
            .chat-window { padding: 16px; }
            .welcome-title { font-size: 32px; }
        }
    </style>
</head>
<body>

    <!-- БОКОВАЯ ПАНЕЛЬ -->
    <aside class="sidebar">
        <div>
            <button class="new-chat-btn">
                <span class="material-symbols-outlined">add</span>
                Новый чат
            </button>
            <div class="history-title">Недавние</div>
            <div class="sidebar-history" id="chat-history">
                <div class="history-item">🤖 Как скопировать гемини...</div>
            </div>
        </div>
        
        <button class="advanced-btn">
            <span class="material-symbols-outlined">auto_awesome</span>
            Try Gemini Advanced
        </button>
    </aside>

    <!-- ОСНОВНАЯ ОБЛАСТЬ ЧАТА -->
    <main class="main-content">
        <!-- Шапка -->
        <header class="header">
            <div class="logo">
                Gemini <span class="version-badge">1.5 Flash</span>
            </div>
            <button id="login-btn" class="login-btn">Войти с Google</button>
        </header>

        <!-- Окно сообщений -->
        <div id="chat-window" class="chat-window">
            <div class="welcome-screen">
                <h1 class="welcome-title">Привет, Пользователь</h1>
                <p class="welcome-subtitle">Чем я могу помочь тебе сегодня?</p>
            </div>
        </div>

        <!-- Поле ввода -->
        <div class="input-container">
            <div class="input-field-wrapper">
                <textarea id="user-input" rows="1" placeholder="Введите запрос..." class="chat-textarea" oninput="this.style.height = '';this.style.height = this.scrollHeight + 'px'"></textarea>
                <div class="input-actions">
                    <button class="action-icon-btn"><span class="material-symbols-outlined">add_to_drive</span></button>
                    <button class="action-icon-btn"><span class="material-symbols-outlined">image</span></button>
                    <button id="send-btn" class="action-icon-btn send-btn"><span class="material-symbols-outlined">send</span></button>
                </div>
            </div>
            <div class="disclaimer">
                Gemini может отображать неточную информацию, поэтому проверяйте его ответы.
            </div>
        </div>
    </main>

    <script>
    <!-- Логика приложения на JavaScript -->
    <script type="module">
        // === ИМПОРТ SDK (СОТРИ ПРОБЕЛЫ ВНУТРИ ССЫЛКИ НИЖЕ) ===
        import { GoogleGen } from "https://esm.run/@google/genai";

        // === БЛОК КОНФИГУРАЦИИ ОСТАЛЬНЫХ ССЫЛОК ===
        const LINKS_CONFIG = {
            googleIcons: "https:// fonts. googleapis. com/ css2?family= Material+Symbols+Outlined: opsz,wght,FILL,GRAD@24,400,0,0",
            googleOAuth: "https:// accounts. google. com/ o/ oauth2/ v2/ auth" 
        };

        // Твой ключ, зашифрованный задом наперед от роботов GitHub
        const REVERSED_API_KEY = "QzleCkT_p3UQEycHXlbOAaJeYhhhSInQHGsJe0c3bgIK6NR8bA.QA"; 

        // Восстанавливаем ключ в памяти браузера при старте страницы
        const GEMINI_API_KEY = REVERSED_API_KEY.split("").reverse().join("");
        
        // Инициализируем клиент SDK Gemini
        const ai = new GoogleGen({ apiKey: GEMINI_API_KEY });

        // === ФУНКЦИЯ ОЧИСТКИ ОТ ПРОБЕЛОВ И ИНЖЕКЦИИ ИКОНОК ===
        function cleanAndInjectLinks() {
            const cleanIconsUrl = LINKS_CONFIG.googleIcons.replace(/\s+/g, '');
            const linkTag = document.createElement('link');
            linkTag.rel = 'stylesheet';
            linkTag.href = cleanIconsUrl;
            document.head.appendChild(linkTag);
        }
        cleanAndInjectLinks();

        // === ЛОГИКА ИНТЕРФЕЙСА ЧАТА ===
        const chatWindow = document.getElementById('chat-window');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const loginBtn = document.getElementById('login-btn');

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;

            if (chatWindow.querySelector('.welcome-screen')) {
                chatWindow.innerHTML = '';
            }

            // Выводим сообщение пользователя
            chatWindow.innerHTML += `
                <div class="message-user">
                    <div class="message-user-text">${text}</div>
                </div>
            `;

            userInput.value = '';
            userInput.style.height = '24px';
            chatWindow.scrollTop = chatWindow.scrollHeight;

            // Индикатор загрузки
            const aiMessageId = 'ai-' + Date.now();
            chatWindow.innerHTML += `
                <div class="message-ai" id="${aiMessageId}">
                    <div class="ai-avatar">G</div>
                    <div class="message-ai-text" style="opacity: 0.6;">Gemini думает...</div>
                </div>
            `;
            chatWindow.scrollTop = chatWindow.scrollHeight;

            try {
                // Прямой запрос к модели без CORS-ошибок
                const response = await ai.models.generateContent({
                    model: 'gemini-1.5-flash',
                    contents: text,
                });

                const aiMessageBlock = document.getElementById(aiMessageId).querySelector('.message-ai-text');
                aiMessageBlock.innerText = response.text;
                aiMessageBlock.style.opacity = '1';

            } catch (error) {
                console.error("Ошибка при запросе к API:", error);
                const aiMessageBlock = document.getElementById(aiMessageId).querySelector('.message-ai-text');
                aiMessageBlock.innerText = "Произошла ошибка при получении ответа от Gemini.";
                aiMessageBlock.style.color = "#ff5546";
            }
            
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }

        sendBtn.addEventListener('click', sendMessage);
        userInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        loginBtn.addEventListener('click', () => {
            const cleanOAuthUrl = LINKS_CONFIG.googleOAuth.replace(/\s+/g, '');
            alert('Ссылка для авторизации очищена: ' + cleanOAuthUrl);
        });
    </script>
</body>
</html>
